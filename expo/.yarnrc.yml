# Yarn configuration for The Complex Patient monorepo.
#
# nodeLinker is set to `node-modules` because Metro's file watcher and SHA-1
# computation use raw fs calls that cannot read inside Yarn Berry's zip cache.
# PnP (Plug'n'Play) is incompatible with React Native's Metro bundler — it
# requires packages to exist as real files on disk. This is the standard
# configuration for React Native / Expo projects using Yarn Berry.
nodeLinker: node-modules

# Under PnP, peer dependencies are resolved strictly: a package can only reach
# `@babel/core` if one of its ancestors provides it. Several Babel plugins used
# by `babel-preset-expo` (e.g. @babel/plugin-transform-flow-strip-types) declare
# `@babel/core` as a peer dependency but the Expo preset does not surface it,
# which breaks the chain at Metro transform time under PnP. The node-modules
# linker hides this via hoisting; under PnP we declare the missing edges
# explicitly so Metro/Babel resolution succeeds without leaving PnP.
packageExtensions:
  babel-preset-expo@*:
    dependencies:
      "@babel/core": "*"
