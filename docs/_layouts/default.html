<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08080b" />
    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container-wide header-inner">
        <a class="brand" href="{{ '/' | relative_url }}" style="background-color: white; height: 36px; width: 36px;">
          <img src="{{ '/assets/zebra-white.svg' | relative_url }}" height="36" width="36" alt="The Complex Patient" class="brand-logo" />
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/architecture/' | relative_url }}">Architecture</a>
          <a href="https://thecomplexpatient.com/secure" class="nav-cta">Web app</a>
          <a href="https://github.com/{{ site.repository }}">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container-wide footer-inner">
        <p class="footer-zebra">
          <span class="footer-stripe" aria-hidden="true"></span>
          In medicine, zebras are the rare and complex cases — not the easy diagnosis.
        </p>
        <p>
          MIT License &middot;
          <a href="https://github.com/{{ site.repository }}">{{ site.repository }}</a>
        </p>
      </div>
    </footer>

    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      mermaid.initialize({
        startOnLoad: false,
        theme: "dark",
        themeVariables: {
          primaryColor: "#1c1c26",
          primaryTextColor: "#ece8e1",
          primaryBorderColor: "#8a847a",
          lineColor: "#b8a8ff",
          secondaryColor: "#16161e",
          tertiaryColor: "#0f0f14",
          fontFamily: "DM Sans, sans-serif",
        },
        securityLevel: "strict",
      });

      document.querySelectorAll("pre code.language-mermaid").forEach((block) => {
        const pre = block.parentElement;
        const figure = document.createElement("figure");
        figure.className = "mermaid-figure";
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = block.textContent;
        figure.appendChild(div);
        pre.replaceWith(figure);
      });

      await mermaid.run({ querySelector: ".mermaid" });
    </script>
  </body>
</html>
